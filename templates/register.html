<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNET</title>
</head>
<body>
    <h1>Регистрация</h1>
    {%if error%}
    <p style="color:red">{{error}}</p>
    {%endif%}
    <form method="post">
        Логин: <input type="text" name="login" required><br>
        Пароль: <input type="password" name="password" required><br>
        ФИО: <input type="text" name="fio" required><br>
        Почта: <input type="text" name="email" required><br>
        Телефон: <input type="text" name="phone" required><br>
        <button type="submit">Войти</button><br>
    </form>
    <p>Уже есть акк? <a href="/login">Войти</a></p>
</body>
</html>
